services:
  vibe:
    build: ./app
    container_name: vibe-playlists
    ports:
      - "${VIBE_PORT:-4546}:4546"
    env_file: .env
    volumes:
      - ./data:/data
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

  analyzer:
    build: ./analyzer
    container_name: vibe-analyzer
    env_file: .env
    environment:
      ANALYSIS_DB_PATH: /data/analysis.db
      MUSIC_ROOT: /music
    volumes:
      - ./data:/data
      - "${MUSIC_DIR:-./music}:/music:ro"
    restart: unless-stopped
